<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoSistemas-V | Verificación de Documentos</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/fuentes.css">
</head>
<body style="background-color: #f4f7f6; flex-direction: column; align-items: center;">

    <header style="margin-bottom: 30px; text-align: center;">
        <h1 style="color: #003366;">TecnoSistemas-V</h1>
        <p>Sistema de Validación de Documentos Digitales</p>
    </header>

    <main style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center;">
        <h3>Verificar Constancia</h3>
        <p style="font-size: 14px; color: #666;">Ingrese el código alfanumérico que aparece al pie del documento para confirmar su autenticidad.</p>
        
        <form style="margin-top: 20px;">
            <input type="text" placeholder="Ej: VLR-2026-001" style="width: 80%; padding: 12px; border: 2px solid #ddd; border-radius: 4px; font-family: monospace; font-size: 18px; text-align: center;">
            <br><br>
            <button type="button" style="background-color: #003366; color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: bold;">
                VALIDAR DOCUMENTO
            </button>
        </form>
    </main>

    <footer style="margin-top: 50px; font-size: 12px; color: #999;">
        © 2026 TecnoSistemas-V | Valera, Edo. Trujillo.
    </footer>

</body>
</html>
