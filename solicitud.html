<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Constancia</title>
    <link rel="stylesheet" href="CSS/estilos.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #003366;">
    <div style="background: white; padding: 40px; border-radius: 15px; text-align: center; width: 350px;">
        <h2 style="color: #003366;">Buscador</h2>
        <input type="text" id="cedula-input" placeholder="Cédula" style="padding: 10px; width: 100%; margin-bottom: 20px;">
        <select id="tipo-documento" style="padding: 10px; width: 100%; margin-bottom: 20px;">
            <option value="estudio">Constancia de Estudios</option>
            <option value="trabajo">Constancia de Trabajo</option>
        </select>
        <button onclick="buscarYGenerar()" style="background: #28a745; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">GENERAR</button>
    </div>
    <script type="module" src="js/buscar.js"></script>
</body>
</html>
