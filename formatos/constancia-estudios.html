<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Sacamos los datos de la "maleta" del navegador
        const estudiante = JSON.parse(localStorage.getItem('estudiante_activo'));

        if (estudiante) {
            // Llenamos los campos con las mayúsculas exactas de tu base de datos
            document.getElementById('nombre-alumno').textContent = `${estudiante.Nombres} ${estudiante.Apellidos}`;
            document.getElementById('cedula-alumno').textContent = estudiante.Cédula;
            document.getElementById('carrera-alumno').textContent = estudiante.Carrera;
            
            // Ponemos la fecha de hoy automáticamente
            const fecha = new Date();
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('fecha-actual').textContent = fecha.toLocaleDateString('es-ES', opciones);
        } else {
            alert("Error: No hay datos. Por favor busca la cédula de nuevo.");
            window.location.href = '../solicitud.html';
        }
    });

    function imprimir() { window.print(); }
</script>
</body>
</html>
