<script>
    document.addEventListener('DOMContentLoaded', () => {
        const trabajador = JSON.parse(localStorage.getItem('estudiante_activo'));

        if (trabajador) {
            // Aquí usamos IDs que suenen a "trabajador" para no confundir
            document.getElementById('nombre-trabajador').textContent = `${trabajador.Nombres} ${trabajador.Apellidos}`;
            document.getElementById('cedula-trabajador').textContent = trabajador.Cédula;
            
            // Si en tu Excel no hay columna 'Cargo', aquí le ponemos 'Personal Administrativo' por defecto
            document.getElementById('cargo-trabajador').textContent = trabajador.Cargo || "Personal Administrativo";
            
            const fecha = new Date();
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('fecha-actual').textContent = fecha.toLocaleDateString('es-ES', opciones);
        } else {
            window.location.href = '../solicitud.html';
        }
    });

    function imprimir() { window.print(); }
</script>
</body>
</html>
