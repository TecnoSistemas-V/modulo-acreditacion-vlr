<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Nóminas - TecnoSistemas-V</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .panel { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #003366; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .btn-accion { padding: 8px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-editar { background: #f39c12; }
        .btn-guardar { background: #27ae60; }
        .btn-eliminar { background: #c0392b; }
        .btn-nuevo { background: #003366; padding: 10px 20px; margin-bottom: 20px; }
        [contenteditable="true"] { background: #fffde7; border: 1px solid #fbc02d; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Control Maestro de Nóminas</h1>
        <button class="btn-accion btn-nuevo" onclick="agregarNuevo()">+ Agregar Estudiante</button>
        <table>
            <thead>
                <tr>
                    <th>Cédula</th>
                    <th>Apellidos</th>
                    <th>Nombres</th>
                    <th>Carrera</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>
    <script src="js/crud.js"></script>
</body>
</html>
