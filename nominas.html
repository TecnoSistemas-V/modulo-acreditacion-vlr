<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración de Estudiantes - TecnoSistemas-V</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="contenedor">
        <a href="index.html">← Volver</a>
        <h1>Administración de Estudiantes</h1>

        <div style="margin-bottom: 20px;">
            <button class="btn-accion btn-nuevo" onclick="nuevoEstudiante()">+ Nuevo Estudiante</button>
        </div>

        <div style="margin-bottom: 20px; padding: 15px; border: 2px dashed #003366; background: #f0f4f8; border-radius: 8px;">
            <h3 style="margin-top:0; color:#003366;">Carga Masiva (Desde Google Sheets)</h3>
            <p style="font-size: 0.85em;">Selecciona el archivo: <strong>nomina_estudiantil_tecnosistemas_2026.csv</strong></p>
            <input type="file" id="archivo-csv" accept=".csv">
            <button class="btn-accion btn-guardar" onclick="importarCSV()">Procesar Archivo</button>
        </div>

        <table id="tabla-estudiantes">
            <thead>
                <tr>
                    <th>Cédula</th>
                    <th>Apellidos</th>
                    <th>Nombres</th>
                    <th>Carrera</th>
                    <th>Sección</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                </tbody>
        </table>
    </div>

    <script src="js/crud.js"></script>
</body>
</html>
