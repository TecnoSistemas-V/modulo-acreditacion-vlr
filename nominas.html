<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Estudios - TecnoSistemas-V</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="contenedor">
        <header>
            <a href="index.html" class="link-volver">← Volver al Panel</a>
            <h1>Administración de Estudiantes</h1>
        </header>

        <section class="seccion-carga">
            <div class="tarjeta-importar">
                <h3>Carga Masiva desde Google Sheets</h3>
                <p>Archivo requerido: <strong>nomina_estudiantil_tecnosistemas_2026.csv</strong></p>
                
                <div class="controles-archivo">
                    <input type="file" id="archivo-csv" accept=".csv">
                    <button class="btn-principal" onclick="importarCSV()">Procesar Archivo</button>
                    <button class="btn-peligro" onclick="vaciarBaseDeDatos()">Vaciar Todo</button>
                </div>
            </div>
        </section>

        <div class="tabla-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Cédula</th>
                        <th>Apellidos</th>
                        <th>Nombres</th>
                        <th>Carrera</th>
                        <th>Sección</th>
                        <th>Dirección</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="js/crud.js"></script>
</body>
</html>
